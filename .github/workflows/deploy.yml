name: Deploy to ECS

on:
push:
branches:
- main

env:
AWS_REGION: ap-south-1
ECR_REPOSITORY: krithika-excel-service
ECS_CLUSTER: excel-cluster
ECS_SERVICE: excel-task-service-cmegjut1
ECS_TASK_DEFINITION: excel-task

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v3

  - name: Configure AWS credentials
    uses: aws-actions/configure-aws-credentials@v2
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}

  - name: Login to Amazon ECR
    id: login-ecr
    uses: aws-actions/amazon-ecr-login@v1

  - name: Build Docker image
    run: |
      docker build -t $ECR_REPOSITORY .

  - name: Tag Docker image
    run: |
      docker tag $ECR_REPOSITORY:latest ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}

  - name: Push Docker image
    run: |
      docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}

  - name: Download current task definition
    run: |
      aws ecs describe-task-definition \
      --task-definition $ECS_TASK_DEFINITION \
      --query taskDefinition \
      > task-definition.json

  - name: Create new task definition
    run: |
      cat task-definition.json | jq \
      'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
      > new-task-definition.json

  - name: Register new task definition
    id: register
    run: |
      TASK_DEF_ARN=$(aws ecs register-task-definition \
      --cli-input-json file://new-task-definition.json \
      --query "taskDefinition.taskDefinitionArn" \
      --output text)

      echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV

  - name: Deploy to ECS
    run: |
      aws ecs update-service \
      --cluster $ECS_CLUSTER \
      --service $ECS_SERVICE \
      --task-definition $TASK_DEF_ARN \
      --force-new-deployment
```
